<div class="sheet-layout">
	<!-- Hidden Theme Controller -->
	<input type="hidden" class="sheet-theme-controller" name="attr_theme" value="dark"/>
	<!-- Hidden Theme Controller -->
	
	<div class="sheet-theme-section">
		<input type="checkbox" class="sheet-theme-toggle" id="sheet-theme-list" name="attr_theme_toggle_open" value="1" />
		<h4 class="sheet-header">
			<span>Theme -&nbsp;</span><span name="attr_theme"></span>
			<label class="sheet-top-collapse-hit" for="sheet-theme-list" title="Toggle section"></label>
		</h4>
		
		<div class="sheet-theme-body">
			<select class="sheet-theme-select" name="attr_theme_mode">
				<option value="ct"> -- Choose Theme -- </option>
				<option value="light">Light</option>
				<option value="dark">Dark</option>
				<option value="cyberpunk">Cyberpunk</option>
				<option value="ancestry">Ancestry</option>
			</select>
		</div>
	</div>
</div>

<script type="text/worker">

on("change:theme_mode change:showracials", () => {
    getAttrs(["theme_mode", "showracials"], (values) => {
        let theme_current = values.theme_mode || "dark";

        if (theme_current === "ancestry") {
            // Fall back to dark if no ancestry is selected yet
            theme_current = values.showracials || "dark";
        }

        setAttrs({ theme: theme_current });
    });
});
</script>
